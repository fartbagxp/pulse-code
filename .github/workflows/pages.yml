name: Deploy XML query explainer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/pulse/queries/**"
      - "src/pulse/templates/**"
      - "src/pulse/data/catalog.json"
      - "src/pulse/data/queries_index.json"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate site
        run: python site/generate.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
